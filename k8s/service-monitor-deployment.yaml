apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: catalog-monitor
  namespace: develop
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: rf-catalog-svc
  endpoints:
    - port: http
      path: /api/catalog/v1/actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s