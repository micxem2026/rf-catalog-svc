server:
  port: 8081

spring:
  application:
    name: rf-catalog-svc
  cloud:
    config:
      uri: ${RF_CONFIG_SERVICE_URL:http://localhost:8888}
  datasource:
    driver-class-name: org.postgresql.Driver

eureka:
  instance:
    hostname: ${RF_CATALOG_SVC_HOSTNAME:localhost}
  client:
    serviceUrl:
      defaultZone: ${RF_EUREKA_SERVICE_URL:http://localhost:8761/eureka/}

